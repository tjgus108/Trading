exchange:
  name: binance          # ccxt 지원 거래소명
  sandbox: true          # 테스트넷 여부

trading:
  symbol: BTC/USDT
  timeframe: 1h
  max_position_size: 0.1  # 포트폴리오 대비 최대 비중

risk:
  max_drawdown: 0.05      # 최대 허용 낙폭 5%
  stop_loss: 0.02         # 손절 2%
  take_profit: 0.04       # 익절 4%

logging:
  level: INFO
  file: logs/trading.log

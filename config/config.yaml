exchange:
  name: bybit            # 거래소: bybit (국내 권장), binance, okx 등
  sandbox: false          # true=테스트넷, false=실거래

trading:
  symbol: BTC/USDT
  timeframe: 1h
  max_position_size: 0.1  # 포트폴리오 대비 최대 비중
  limit: 1000              # 가져올 OHLCV 캔들 수

strategy: donchian_breakout  # 전략 목록: ema_cross, donchian_breakout, funding_rate 등
dry_run: true                # true면 주문 미제출 (시뮬레이션) ← 처음엔 반드시 true!

risk:
  max_drawdown: 0.05        # 최대 허용 낙폭 5%
  max_daily_loss: 0.03      # 일일 최대 손실 3%
  stop_loss_atr_multiplier: 1.5            # ATR 배수 (손절)
  take_profit_atr_multiplier: 3.0          # ATR 배수 (익절)
  risk_per_trade: 0.01      # 트레이드당 계좌 위험 비율 1%
  max_consecutive_losses: 5
  flash_crash_pct: 0.10     # 단일 캔들 10% 이상 변동 시 서킷 브레이커

logging:
  level: INFO
  file: logs/trading.log

telegram:
  enabled: false
  bot_token: ""   # TELEGRAM_BOT_TOKEN env var로도 설정 가능
  chat_id: ""     # TELEGRAM_CHAT_ID env var로도 설정 가능
